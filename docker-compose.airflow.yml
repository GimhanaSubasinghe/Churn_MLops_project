services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_UID: "50000"

      # used by your DAG
      PYTHON_BIN: python
      PROJECT_ROOT: /opt/project
      DAGSHUB_USER_TOKEN: "441f260e0e9497c3c5e8fef21c87ea7af79f8d34"
    volumes:
      # Mount your project (so scripts & data exist inside the container)
      - ./:/opt/project
      # Mount DAGs folder (Airflow reads dags from here)
      - ./airflow_dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    restart: "no"

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
      - airflow-init
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      # These are used by your DAG's BashOperator
      PYTHON_BIN: python
      PROJECT_ROOT: /opt/project
      DAGSHUB_USER_TOKEN: "441f260e0e9497c3c5e8fef21c87ea7af79f8d34"
    volumes:
      - ./:/opt/project
      - ./airflow_dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      PYTHON_BIN: python
      PROJECT_ROOT: /opt/project
      DAGSHUB_USER_TOKEN: "441f260e0e9497c3c5e8fef21c87ea7af79f8d34"
    volumes:
      - ./:/opt/project
      - ./airflow_dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    restart: unless-stopped

volumes:
  airflow_pgdata:
  airflow_logs:
